name: Build & Test

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  # Opt into Node.js 24 for all JS-based actions (checkout, setup-dotnet, upload-artifact).
  # Node.js 20 becomes the default on 2026-06-02 and is removed on 2026-09-16.
  # Remove this flag once the actions used above ship a release that natively targets Node.js 24
  # (watch actions/checkout, actions/setup-dotnet, actions/upload-artifact for a v4.x.x bump).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for Nerdbank.GitVersioning

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore tools
        run: dotnet tool restore

      - name: Restore
        run: dotnet restore Scribe.slnx

      - name: Build
        run: dotnet build Scribe.slnx --configuration Release --no-restore

      - name: Test
        continue-on-error: true
        run: dotnet test Scribe.slnx --configuration Release --no-build --verbosity normal --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: "**/test-results.trx"

      - name: Upload packages
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: packages
          path: |
            .artifacts/packages/*.nupkg
            .artifacts/packages/*.snupkg
