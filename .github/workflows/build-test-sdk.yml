name: Build & Test (SDK)

on:
  push:
    branches: [master]
    paths:
      - 'Scribe.Sdk/**'
      - 'Scribe/build/Scribe.LocalDev.props'
      - 'Scribe/build/Scribe.LocalDev.targets'
      - 'Directory.Build.props'
      - 'Directory.Build.targets'
      - 'Directory.Packages.props'
      - 'global.json'
      - 'LICENSE'
      - '.config/dotnet-tools.json'
      - '.github/workflows/build-test-sdk.yml'
  pull_request:
    paths:
      - 'Scribe.Sdk/**'
      - 'Scribe/build/Scribe.LocalDev.props'
      - 'Scribe/build/Scribe.LocalDev.targets'
      - 'Directory.Build.props'
      - 'Directory.Build.targets'
      - 'Directory.Packages.props'
      - 'global.json'
      - 'LICENSE'
      - '.config/dotnet-tools.json'
      - '.github/workflows/build-test-sdk.yml'
  workflow_dispatch:

permissions:
  contents: read

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-test:
    name: Build & Test (SDK)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          cache: true
          cache-dependency-path: |
            Scribe.Sdk/**/*.csproj
            **/Directory.*.props
            **/Directory.*.targets

      - name: Cache dotnet tools
        uses: actions/cache@v4
        with:
          path: ~/.dotnet/tools
          key: ${{ runner.os }}-dotnet-tools-${{ hashFiles('.config/dotnet-tools.json') }}
          restore-keys: |
            ${{ runner.os }}-dotnet-tools-

      - name: Restore tools
        run: dotnet tool restore

      - name: Restore
        run: dotnet restore Scribe.Sdk/Scribe.Sdk.csproj

      - name: Build
        run: dotnet build Scribe.Sdk/Scribe.Sdk.csproj --configuration Release --no-restore

      - name: Pack SDK
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: dotnet pack Scribe.Sdk/Scribe.Sdk.csproj --configuration Release --no-build --output .artifacts/packages

      - name: Upload packages
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: packages-sdk
          path: .artifacts/packages/*.nupkg
